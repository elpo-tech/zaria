<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CODE STORM: Coding Marathon</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 0;
      }

      h1 {
        font-size: 4vw;
        margin-bottom: 30px;
        letter-spacing: 2px;
      }

      .timer {
        font-size: 15vw;
        font-weight: bold;
        margin: 20px 0;
      }

      .progress-container {
        width: 80%;
        height: 30px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        transition: width 1s linear;
      }

      .label {
        font-size: 2vw;
        opacity: 0.8;
        margin-top: 20px;
      }

      button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1.2vw;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background-color: #00c6ff;
        color: white;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 6vw;
        }
        .timer {
          font-size: 20vw;
        }
        .label {
          font-size: 4vw;
        }
        button {
          font-size: 4vw;
          padding: 8px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>CODE STORM: 24HR CODING CHALLENGE</h1>
      <div class="timer" id="timer">00:00:00</div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="label">24 Hour Countdown in Progress</div>
      <button onclick="toggleFullScreen()">
        GATUNGA COMMUNITY LIBRARY & IT CENTER
      </button>
    </div>

    <script>
      // 🔧 SET YOUR FIXED START DATE & TIME HERE
      const START_DATETIME = "2026-03-21T08:00:00";

      function startCountdown() {
        const startTime = new Date(START_DATETIME);
        const endTime = new Date(startTime.getTime() + 24 * 60 * 60 * 1000);

        setInterval(() => {
          const currentTime = new Date();

          if (currentTime < startTime) {
            const diffToStart = startTime - currentTime;
            const h = Math.floor(diffToStart / (1000 * 60 * 60));
            const m = Math.floor(
              (diffToStart % (1000 * 60 * 60)) / (1000 * 60),
            );
            const s = Math.floor((diffToStart % (1000 * 60)) / 1000);

            document.getElementById("timer").innerText =
              "Starts in " +
              String(h).padStart(2, "0") +
              ":" +
              String(m).padStart(2, "0") +
              ":" +
              String(s).padStart(2, "0");
            return;
          }

          const diff = endTime - currentTime;
          if (diff <= 0) {
            document.getElementById("timer").innerText = "00:00:00";
            document.getElementById("progressBar").style.width = "100%";
            return;
          }

          const hoursLeft = Math.floor(diff / (1000 * 60 * 60));
          const minutesLeft = Math.floor(
            (diff % (1000 * 60 * 60)) / (1000 * 60),
          );
          const secondsLeft = Math.floor((diff % (1000 * 60)) / 1000);

          document.getElementById("timer").innerText =
            String(hoursLeft).padStart(2, "0") +
            ":" +
            String(minutesLeft).padStart(2, "0") +
            ":" +
            String(secondsLeft).padStart(2, "0");

          const totalDuration = 24 * 60 * 60 * 1000;
          const elapsed = currentTime - startTime;
          const progress = Math.min((elapsed / totalDuration) * 100, 100);
          document.getElementById("progressBar").style.width = progress + "%";
        }, 1000);
      }

      function toggleFullScreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      window.onload = startCountdown;
    </script>
  </body>
</html>
